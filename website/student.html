<!DOCTYPE html>

<style>
:root {
  --bg-0: #0a0a0a;
  --bg-1: #0a0a0a;
  --bg-2: #111111;
  --bg-3: #1a1a1a;
  --tx-1: #ffffff;
  --tx-2: #d1d1d6;
  --tx-3: #6e6e73;
  --accent: #00d4ff;
  --accent-dim: rgba(0,212,255,.08);
  --accent-line: rgba(0,212,255,.25);
  --err: #ff453a;
  --warn: #0ea5e9;
  --line: rgba(255,255,255,.10);
  --line-strong: rgba(255,255,255,.20);
  --line-dash: rgba(255,255,255,.08);
  --font-display: "Space Grotesk","Inter",system-ui,sans-serif;
  --font-body: "Space Grotesk","Inter","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  --font-sans: "PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-variant-numeric: tabular-nums; }
body {
  font-family: var(--font-sans);
  background: var(--bg-0);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 40px;
  padding: 30px 20px;
  color: var(--tx-1);
}

/* ===== 左侧说明 ===== */
.prototype-side { max-width: 300px; padding-top: 40px; }
.prototype-side h1 { font-family: var(--font-body); font-size: 18px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 4px; }
.side-brand-wrap { position: relative; cursor: pointer; }
/* hover bridge — transparent zone below so mouse can reach dropdown without losing hover */
.side-brand-wrap::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 100%;
  height: 30px;
}
.side-brand { cursor: pointer; }
.side-brand .proto { color: var(--accent); } /* the .icu */
.side-brand-dropdown {
  position: absolute; top: 100%; left: 0; z-index: 200;
  background: var(--bg-2); border: 1px solid var(--line-strong);
  padding: 6px 0; min-width: 160px;
  opacity: 0; visibility: hidden; transform: translateY(-4px);
  transition: opacity .2s, visibility .2s, transform .2s;
}
.side-brand-wrap:hover .side-brand-dropdown {
  opacity: 1; visibility: visible; transform: translateY(0);
}
/* JS-controlled open state (primary mechanism) */
.side-brand-dropdown.open {
  opacity: 1; visibility: visible; transform: translateY(0);
}
.brand-dropdown-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; cursor: pointer; border: none; background: transparent;
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  letter-spacing: .06em; color: #d1d1d6; width: 100%; text-align: left;
  transition: color .15s, background .15s;
}
.brand-dropdown-item:hover { background: var(--bg-3); color: #ffffff; }
.brand-dropdown-item.active { color: #ffffff; }
.brand-dropdown-dot { width: 10px; height: 10px; border-radius: 0; flex-shrink: 0; }
.brand-dropdown-check { display: none; font-size: 10px; margin-left: 4px; color: var(--accent); }
.brand-dropdown-item.active .brand-dropdown-check { display: inline; }
.prototype-side .brand { font-family: var(--font-display); font-size: 10px; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 12px; }
.prototype-side .sub { font-size: 13px; color: var(--tx-2); margin-bottom: 28px; line-height: 1.7; }
.side-note {
  background: var(--bg-1); border: 1px solid var(--line); padding: 14px 16px; margin-bottom: 14px;
}
.side-note h4 { font-family: var(--font-display); font-size: 11px; color: var(--accent); margin-bottom: 6px; letter-spacing: 0.08em; }
.side-note p { font-size: 12px; color: var(--tx-2); line-height: 1.7; }
.side-note.warn { border-color: var(--warn); }
.side-note.warn h4 { color: var(--warn); }

/* ===== 手机外壳（保留圆角——硬件模拟） ===== */
.phone {
  width: 375px; height: 780px; background: #000;
  border-radius: 44px; padding: 12px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 2px var(--line-strong);
  flex-shrink: 0;
}
.screen {
  width: 100%; height: 100%; background: var(--bg-0);
  border-radius: 34px; overflow: hidden;
  position: relative; display: flex; flex-direction: column;
}
.notch {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 110px; height: 26px; background: #000; border-radius: 16px; z-index: 50;
}
.statusbar {
  height: 44px; display: flex; justify-content: space-between; align-items: center;
  padding: 0 28px; font-family: var(--font-display); font-size: 12px; font-weight: 600; flex-shrink: 0;
  color: var(--tx-2);
}
.statusbar .icons { display: flex; gap: 8px; align-items: center; font-family: var(--font-display); font-size: 11px; }

/* ===== 页面容器 ===== */
.pages { flex: 1; overflow: hidden; position: relative; }
.m-page {
  position: absolute; inset: 0; overflow-y: auto;
  padding: 8px 14px 90px; display: none;
}
.m-page.active { display: block; animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.m-page::-webkit-scrollbar { display: none; }

/* ===== 底部Tab ===== */
.tabbar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 76px;
  background: rgba(7,10,8,0.96); border-top: 1px solid var(--line);
  display: flex; z-index: 40; padding-bottom: 14px;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; color: #d1d1d6; transition: color 0.15s; /* bright gray — independent of theme */
  position: relative;
}
.tab-item .tn { font-family: var(--font-display); font-size: 9px; letter-spacing: 0.08em; }
.tab-item .tt { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
.tab-item.active { color: #ffffff; }
.tab-item.active::before {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%;
  height: 2px; background: var(--accent);
}

/* ===== 通用组件 ===== */
.m-card { background: var(--bg-1); border: 1px solid var(--line); padding: 14px; margin-bottom: 12px; }
.m-title {
  font-family: var(--font-body); font-size: 15px; font-weight: 600;
  margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;
}
.m-title .more { font-family: var(--font-display); font-size: 11px; color: var(--tx-3); font-weight: 400; letter-spacing: 0.08em; }

/* 统一徽章 */
.tag {
  font: 500 10px/1 var(--font-display); text-transform: uppercase; letter-spacing: .08em;
  padding: 3px 6px; border: 1px solid var(--line-strong); color: var(--tx-2);
  display: inline-block;
}
.tag.ok  { color: var(--accent); border-color: var(--accent-line); }
.tag.err { color: var(--err);    border-color: var(--err); }
.tag.warn{ color: var(--warn);   border-color: var(--warn); }

/* ===== 首页 ===== */
.home-hero { padding: 6px 4px 16px; }
.home-hero .hi { font-family: var(--font-body); font-size: 14px; color: var(--tx-2); }
.home-hero .name { font-family: var(--font-body); font-size: 20px; font-weight: 700; margin-top: 2px; }
.home-hero .date { font-family: var(--font-display); font-size: 11px; color: var(--tx-3); margin-top: 4px; letter-spacing: 0.06em; }

.streak-card {
  background: var(--bg-1); border: 1px solid var(--line); padding: 16px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 14px;
}
.streak-num { font-family: var(--font-display); font-size: 32px; font-weight: 800; color: var(--accent); }
.streak-label { font-family: var(--font-display); font-size: 10px; color: var(--tx-2); letter-spacing: 0.08em; }
.streak-info { flex: 1; border-left: 1px solid var(--line); padding-left: 14px; }
.streak-info .t1 { font-family: var(--font-body); font-size: 13px; font-weight: 600; }
.streak-info .t2 { font-family: var(--font-display); font-size: 11px; color: var(--tx-2); margin-top: 2px; letter-spacing: 0.04em; }

.task-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; background: var(--bg-2);
  margin-bottom: 8px; cursor: pointer;
  border: 1px solid transparent; transition: background 0.15s; min-height: 56px;
}
.task-item:active { background: var(--bg-3); }
.task-item.done { opacity: 0.5; }
.task-badge {
  font: 600 10px/1 var(--font-display); letter-spacing: 0.06em;
  padding: 4px 8px; border: 1px solid var(--line-strong);
  color: var(--tx-2); white-space: nowrap;
}
.task-badge.preview { color: var(--accent); border-color: var(--accent-line); }
.task-badge.homework { color: var(--warn); border-color: var(--warn); }
.task-badge.review { color: var(--accent); border-color: var(--accent-line); }
.task-badge.done { color: var(--accent); border-color: var(--accent); }
.task-info { flex: 1; }
.task-info .tt { font-size: 13px; font-weight: 600; }
.task-info .td { font-size: 11px; color: var(--tx-2); margin-top: 2px; line-height: 1.5; }
.task-arrow { font-family: var(--font-display); color: var(--tx-3); font-size: 14px; }

.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.quick-item {
  background: var(--bg-2); padding: 14px;
  cursor: pointer; transition: background 0.15s; border: 1px solid transparent; min-height: 72px;
}
.quick-item:active { background: var(--bg-3); border-color: var(--accent-line); }
.quick-item .qn { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.quick-item .qt { font-family: var(--font-body); font-size: 13px; font-weight: 600; }
.quick-item .qd { font-family: var(--font-display); font-size: 10px; color: var(--tx-3); margin-top: 3px; letter-spacing: 0.04em; }

/* ===== 刷题模式 ===== */
.mode-banner {
  padding: 16px; margin-bottom: 10px; cursor: pointer;
  position: relative; overflow: hidden; transition: background 0.15s;
  border: 1px solid var(--line); border-left: 2px solid var(--accent);
  background: var(--bg-1);
}
.mode-banner:active { background: var(--accent-dim); }
.mode-banner .mn { font-family: var(--font-display); font-size: 10px; color: var(--accent); letter-spacing: 0.06em; }
.mode-banner .mt { font-family: var(--font-body); font-size: 15px; font-weight: 700; margin-top: 4px; }
.mode-banner .md { font-size: 11px; color: var(--tx-2); margin-top: 6px; line-height: 1.6; }
.mode-tag {
  font: 500 10px/1 var(--font-display); letter-spacing: 0.06em;
  padding: 3px 6px; border: 1px solid var(--line-strong);
  color: var(--tx-3); display: inline-block; margin-top: 8px;
}

/* ===== 答题界面 ===== */
.quiz-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.quiz-progress { flex: 1; height: 2px; background: var(--bg-3); margin: 0 12px; overflow: hidden; }
.quiz-progress .qp { height: 100%; background: var(--accent); transition: width 0.3s; }
.quiz-count { font-family: var(--font-display); font-size: 12px; color: var(--tx-2); white-space: nowrap; }
.quiz-timer { font-family: var(--font-display); font-size: 12px; color: var(--warn); font-weight: 600; white-space: nowrap; letter-spacing: 0.04em; }
.q-card { background: var(--bg-1); border: 1px solid var(--line); padding: 18px; margin-bottom: 14px; }
.q-meta { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.q-stem { font-family: var(--font-sans); font-size: 15px; line-height: 1.9; }
.opt {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg-2); border: 1px solid var(--line);
  padding: 14px; margin-bottom: 8px;
  cursor: pointer; transition: background 0.15s; font-size: 14px; min-height: 48px;
}
.opt:active { background: var(--bg-3); }
.opt .ol {
  width: 28px; height: 28px;
  border: 1px solid var(--line-strong);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 13px; font-weight: 600; flex-shrink: 0; color: var(--tx-2);
}
.opt.sel { border-color: var(--accent-line); background: var(--accent-dim); }
.opt.sel .ol { background: var(--accent); border-color: var(--accent); color: var(--bg-0); }
.opt.right { border-color: var(--accent); background: var(--accent-dim); }
.opt.right .ol { background: var(--accent); border-color: var(--accent); color: var(--bg-0); }
.opt.right .ol::after { content: ''; }
.opt.wrong { border-color: var(--err); background: rgba(255,77,94,0.08); }
.opt.wrong .ol { background: var(--err); border-color: var(--err); color: #fff; }
.opt.disabled { pointer-events: none; }
.opt .pass-fail { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.08em; margin-left: auto; }

.quiz-actions { display: flex; gap: 10px; margin-top: 6px; }
.btn {
  flex: 1; padding: 14px; border: 1px solid var(--line);
  font-family: var(--font-body); font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s;
  background: transparent;
}
.btn:active { background: var(--accent); color: var(--bg-0); }
.btn-primary { color: var(--accent); border-color: var(--accent-line); }
.btn-primary:disabled { color: var(--tx-3); border-color: var(--line); cursor: not-allowed; background: var(--bg-3); }
.btn-ghost { color: var(--tx-2); border-color: var(--line); }

.result-banner { padding: 14px 16px; margin-bottom: 14px; display: flex; gap: 12px; align-items: center; border: 1px solid var(--line); }
.result-banner.ok { border-left: 2px solid var(--accent); background: var(--accent-dim); }
.result-banner.no { border-left: 2px solid var(--err); background: rgba(255,77,94,0.06); }
.result-banner .rb-tag { font-family: var(--font-display); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; }
.result-banner .rb-tag.ok { color: var(--accent); }
.result-banner .rb-tag.no { color: var(--err); }
.result-banner .rt { font-size: 15px; font-weight: 700; }
.result-banner .rt.ok { color: var(--accent); }
.result-banner .rt.no { color: var(--err); }
.result-banner .rd { font-size: 11px; color: var(--tx-2); margin-top: 2px; }

.analysis-card { background: var(--bg-1); border: 1px solid var(--line); border-top: 2px solid var(--accent-line); padding: 14px 16px; margin-bottom: 14px; }
.analysis-card .at { font-family: var(--font-display); font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: 0.08em; margin-bottom: 8px; }
.analysis-card .ac { font-family: var(--font-sans); font-size: 13px; line-height: 1.9; }
.kp-tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

/* ===== 错题本 ===== */
.mistake-stat { display: flex; gap: 8px; margin-bottom: 14px; }
.ms-box { flex: 1; background: var(--bg-1); border: 1px solid var(--line); padding: 14px 10px; text-align: center; }
.ms-box .v { font-family: var(--font-display); font-size: 22px; font-weight: 800; }
.ms-box .l { font-family: var(--font-display); font-size: 10px; color: var(--tx-3); margin-top: 4px; letter-spacing: 0.08em; }

.mistake-item { background: var(--bg-1); border: 1px solid var(--line); border-left: 2px solid var(--err); padding: 14px; margin-bottom: 10px; }
.mistake-item .mq { font-size: 13px; line-height: 1.7; margin: 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.mistake-item .mm { display: flex; gap: 8px; align-items: center; }
.mistake-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.mistake-foot .cnt { font-size: 11px; color: var(--err); }
.btn-mini {
  font: 600 11px/1 var(--font-display); letter-spacing: 0.06em;
  padding: 6px 14px; border: 1px solid var(--accent-line);
  background: transparent; color: var(--accent); cursor: pointer;
}

/* ===== 学情 ===== */
.report-hero { text-align: center; padding: 10px 0 18px; }
.report-hero .score {
  font-family: var(--font-display); font-size: 44px; font-weight: 800; color: var(--accent);
}
.report-hero .sl { font-family: var(--font-display); font-size: 12px; color: var(--tx-2); letter-spacing: 0.06em; }

.ring-row { display: flex; justify-content: space-around; margin-bottom: 6px; }
.ring-item { text-align: center; }
.ring { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; position: relative; }
.ring::before { content: ''; position: absolute; inset: 5px; background: var(--bg-1); }
.ring span { position: relative; font-family: var(--font-display); font-size: 13px; font-weight: 700; }
.ring-item .rl { font-family: var(--font-body); font-size: 10px; color: var(--tx-2); }

.mastery-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.mastery-row .mn { width: 84px; font-family: var(--font-body); font-size: 12px; flex-shrink: 0; }
.mastery-row .mb { flex: 1; height: 6px; background: var(--bg-3); overflow: hidden; }
.mastery-row .mf { height: 100%; }
.mastery-row .mv { width: 36px; font-family: var(--font-display); font-size: 12px; font-weight: 700; text-align: right; }

.weak-mini { background: var(--bg-2); padding: 12px 14px; margin-bottom: 10px; border-left: 2px solid; }
.weak-mini.p0 { border-left-color: var(--err); }
.weak-mini.p1 { border-left-color: var(--warn); }
.weak-mini .wn { font-family: var(--font-body); font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; }
.weak-mini .wr { font-size: 11px; color: var(--tx-2); margin-top: 4px; line-height: 1.6; }

/* ===== 课堂 ===== */
.class-hero { text-align: center; padding: 20px 20px 16px; }
.class-hero .prompt { font-family: var(--font-display); font-size: 14px; color: var(--accent); letter-spacing: 0.04em; }
.class-hero .cd { font-size: 12px; color: var(--tx-2); margin-top: 10px; line-height: 1.7; }

.code-input { display: flex; gap: 8px; justify-content: center; margin: 24px 0; }
.code-digit {
  width: 42px; height: 52px; background: var(--bg-2);
  border: 1px solid var(--line);
  font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--tx-1);
  text-align: center; outline: none;
}
.code-digit:focus { border-color: var(--accent); }

.live-status { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 16px; }
.live-tag {
  font: 600 11px/1 var(--font-display); letter-spacing: 0.1em;
  padding: 3px 8px; border: 1px solid var(--accent-line);
  color: var(--accent);
}
.live-status span { font-family: var(--font-body); font-size: 12px; color: var(--accent); }

.rank-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-2); margin-bottom: 8px; border: 1px solid transparent; }
.rank-item.me { border: 1px solid var(--accent-line); background: var(--accent-dim); }
.rank-no {
  width: 24px; font-family: var(--font-display); font-size: 11px; font-weight: 700;
  color: var(--tx-3);
}
.rank-no.top { color: var(--accent); }
.rank-name { flex: 1; font-size: 13px; }
.rank-score { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--accent); }
.rank-me { font: 600 10px/1 var(--font-display); color: var(--accent); letter-spacing: 0.08em; border: 1px solid var(--accent-line); padding: 2px 5px; }

.answer-stat { display: flex; gap: 8px; margin-top: 12px; }
.as-bar { flex: 1; text-align: center; }
.as-bar .b { height: 54px; background: var(--bg-3); display: flex; align-items: flex-end; justify-content: center; overflow: hidden; }
.as-bar .f { width: 100%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--bg-0); }
.as-bar .l { font-family: var(--font-display); font-size: 11px; color: var(--tx-2); margin-top: 5px; letter-spacing: 0.04em; }

/* toast */
.toast {
  position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
  background: var(--bg-0); color: var(--accent); font-family: var(--font-display);
  font-size: 12px; letter-spacing: 0.04em;
  padding: 8px 18px; border: 1px solid var(--accent-line); z-index: 100; display: none;
}

      <div class="tab-item" data-p="m-report" onclick="goPage('m-report',this)"><span class="tn">04</span><span class="tt">STATS</span></div>
      <div class="tab-item" data-p="m-class" onclick="goPage('m-class',this)"><span class="tn">05</span><span class="tt">CLASS</span></div>
    </div>
  </div>
</div>

<!-- 右侧联动说明 -->
<div class="prototype-side">
  <h1>DATA LOOP</h1>
  <div class="brand">STUDENT-TEACHER SYNC</div>
  <div class="sub">学生端每一次作答都会实时驱动教学闭环。</div>

  <div class="side-note">
    <h4>01 · BEFORE CLASS</h4>
    <p>教师布置预习包 → 学生手机完成 → 教师端看到「班级预习报告」，上课直奔共性薄弱点。</p>
  </div>
  <div class="side-note">
    <h4>02 · IN CLASS</h4>
    <p>教师发起随堂测 → 学生限时作答 → 大屏实时展示选项分布，当堂解决高频错误。</p>
  </div>
  <div class="side-note warn">
    <h4>03 · AFTER CLASS</h4>
    <p>系统按课堂掌握度推送分层作业 → 自动批改 → 更新知识点画像 → 决定下一次预习内容。</p>
  </div>
  <div class="side-note">
    <h4>· DATA LOOP</h4>
    <p>学生端产生的答题数据，全部汇入教师端看板（即您之前看到的网页版数据看板），两端共用一套题库与学情模型。</p>
  </div>
</div>

<script>
// ===== 页面切换 =====
function goPage(id, el) {
  document.querySelectorAll('.m-page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.p === id));
  if (id === 'm-quiz') {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.p === 'm-practice'));
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

// ===== 刷题逻辑 =====
const quizBank = {
  smart: [
    {
      kp: '离散型随机变量', module: '概率与统计', diff: 2, type: 'choice',
      stem: '袋中有 4 个红球和 3 个白球，从中任取 2 个球，设取到白球的个数为 $X$，则 $P(X=1) = $',
      options: [
        { l: 'A', c: '$\\\\frac{3}{7}$' },
        { l: 'B', c: '$\\\\frac{4}{7}$' },
        { l: 'C', c: '$\\\\frac{2}{7}$' },
        { l: 'D', c: '$\\\\frac{1}{7}$' }
      ],
      answer: 'B',
      analysis: '$P(X=1) = \\\\frac{C_3^1 \\\\cdot C_4^1}{C_7^2} = \\\\frac{12}{21} = \\\\frac{4}{7}$。超几何分布的直接应用。'
    },
    {
      kp: '椭圆', module: '几何与向量', diff: 3, type: 'choice',
      stem: '椭圆 $\\\\frac{x^2}{25} + \\\\frac{y^2}{9} = 1$ 上一点 $P$ 到左焦点 $F_1$ 的距离为 3，则 $P$ 到右焦点 $F_2$ 的距离为',
      options: [
        { l: 'A', c: '5' },
        { l: 'B', c: '6' },
        { l: 'C', c: '7' },
        { l: 'D', c: '8' }
      ],
      answer: 'C',
      analysis: '由椭圆定义：$|PF_1| + |PF_2| = 2a = 10$，所以 $|PF_2| = 10 - 3 = 7$。'
    },
    {
      kp: '三角恒等变换', module: '函数与导数', diff: 3, type: 'choice',
      stem: '已知 $\\\\tan\\\\theta = 2$，则 $\\\\frac{\\\\sin\\\\theta + \\\\cos\\\\theta}{\\\\sin\\\\theta - \\\\cos\\\\theta} = $',
      options: [
        { l: 'A', c: '3' },
        { l: 'B', c: '-3' },
        { l: 'C', c: '$\\\\frac{1}{3}$' },
        { l: 'D', c: '$-\\\\frac{1}{3}$' }
      ],
      answer: 'A',
      analysis: '分子分母同除以 $\\\\cos\\\\theta$：$\\\\frac{\\\\tan\\\\theta + 1}{\\\\tan\\\\theta - 1} = \\\\frac{2+1}{2-1} = 3$。'
    }
  ],
  homework: [
    {
      kp: '三角函数的图象', module: '函数与导数', diff: 2, type: 'choice',
      stem: '将函数 $y = \\\\sin x$ 的图象向左平移 $\\\\frac{\\\\pi}{3}$ 个单位，所得图象对应的函数为',
      options: [
        { l: 'A', c: '$y = \\\\sin(x + \\\\frac{\\\\pi}{3})$' },
        { l: 'B', c: '$y = \\\\sin(x - \\\\frac{\\\\pi}{3})$' },
        { l: 'C', c: '$y = \\\\sin x + \\\\frac{\\\\pi}{3}$' },
        { l: 'D', c: '$y = \\\\cos x$' }
      ],
      answer: 'A',
      analysis: '左加右减原则：向左平移 $\\\\frac{\\\\pi}{3}$，即将 $x$ 替换为 $x + \\\\frac{\\\\pi}{3}$。'
    },
    {
      kp: '二倍角公式', module: '函数与导数', diff: 2, type: 'choice',
      stem: '$\\\\cos^2\\\\frac{\\\\pi}{8} - \\\\sin^2\\\\frac{\\\\pi}{8} = $',
      options: [
        { l: 'A', c: '$\\\\frac{1}{2}$' },
        { l: 'B', c: '$\\\\frac{\\\\sqrt{2}}{2}$' },
        { l: 'C', c: '$\\\\frac{\\\\sqrt{3}}{2}$' },
        { l: 'D', c: '1' }
      ],
      answer: 'B',
      analysis: '利用二倍角公式：$\\\\cos^2\\\\alpha - \\\\sin^2\\\\alpha = \\\\cos 2\\\\alpha = \\\\cos\\\\frac{\\\\pi}{4} = \\\\frac{\\\\sqrt{2}}{2}$。'
    },
    {
      kp: '正弦定理', module: '函数与导数', diff: 3, type: 'choice',
      stem: '在 $\\\\triangle ABC$ 中，$a = 2$，$A = 30°$，$B = 45°$，则 $b = $',
      options: [
        { l: 'A', c: '$\\\\sqrt{2}$' },
        { l: 'B', c: '$2\\\\sqrt{2}$' },
        { l: 'C', c: '$\\\\sqrt{3}$' },
        { l: 'D', c: '$2\\\\sqrt{3}$' }
      ],
      answer: 'B',
      analysis: '由正弦定理：$\\\\frac{a}{\\\\sin A} = \\\\frac{b}{\\\\sin B}$，得 $b = \\\\frac{2 \\\\times \\\\frac{\\\\sqrt{2}}{2}}{\\\\frac{1}{2}} = 2\\\\sqrt{2}$。'
    }
  ],
  mistake: [
    {
      kp: '椭圆', module: '几何与向量', diff: 4, type: 'choice',
      stem: '（错题重做）椭圆 $\\\\frac{x^2}{a^2} + \\\\frac{y^2}{b^2} = 1$（$a>b>0$）的离心率为 $\\\\frac{1}{2}$，则 $\\\\frac{b}{a} = $',
      options: [
        { l: 'A', c: '$\\\\frac{1}{2}$' },
        { l: 'B', c: '$\\\\frac{\\\\sqrt{2}}{2}$' },
        { l: 'C', c: '$\\\\frac{\\\\sqrt{3}}{2}$' },
        { l: 'D', c: '$\\\\frac{3}{4}$' }
      ],
      answer: 'C',
      analysis: '$e = \\\\frac{c}{a} = \\\\frac{1}{2}$，$c^2 = \\\\frac{a^2}{4}$，$b^2 = a^2 - c^2 = \\\\frac{3a^2}{4}$，故 $\\\\frac{b}{a} = \\\\frac{\\\\sqrt{3}}{2}$。'
    },
    {
      kp: '条件概率', module: '概率与统计', diff: 3, type: 'choice',
      stem: '（错题重做）已知 $P(A) = 0.6$，$P(B|A) = 0.5$，则 $P(AB) = $',
      options: [
        { l: 'A', c: '0.2' },
        { l: 'B', c: '0.3' },
        { l: 'C', c: '0.4' },
        { l: 'D', c: '0.5' }
      ],
      answer: 'B',
      analysis: '$P(AB) = P(A) \\\\cdot P(B|A) = 0.6 \\\\times 0.5 = 0.3$。'
    },
    {
      kp: '函数单调性', module: '函数与导数', diff: 2, type: 'choice',
      stem: '（错题重做）函数 $f(x) = \\\\log_2(x^2 - 2x)$ 的单调递增区间为',
      options: [
        { l: 'A', c: '$(1, +\\\\infty)$' },
        { l: 'B', c: '$(2, +\\\\infty)$' },
        { l: 'C', c: '$(-\\\\infty, 0)$' },
        { l: 'D', c: '$(-\\\\infty, 1)$' }
      ],
      answer: 'B',
      analysis: '定义域 $x^2 - 2x > 0$ 即 $x < 0$ 或 $x > 2$。内层函数在 $(2, +\\\\infty)$ 递增，外层对数函数递增，复合后递增区间为 $(2, +\\\\infty)$。'
    }
  ],
  special: []
};
quizBank.special = quizBank.smart;

let quiz = null;
let quizSecs = 0;
let quizTimerInt = null;

function startQuiz(mode) {
  quiz = { mode, list: quizBank[mode] || quizBank.smart, idx: 0, sel: null, answered: false, correctCnt: 0 };
  quizSecs = 0;
  clearInterval(quizTimerInt);
  quizTimerInt = setInterval(() => {
    quizSecs++;
    const m = String(Math.floor(quizSecs/60)).padStart(2,'0');
    const s = String(quizSecs%60).padStart(2,'0');
    const el = document.getElementById('quiz-timer');
    if (el) el.textContent = 'T+ ' + m + ':' + s;
  }, 1000);
  goPage('m-quiz');
  renderQuiz();
}

function renderQuiz() {
  const q = quiz.list[quiz.idx];
  quiz.sel = null;
  quiz.answered = false;
  document.getElementById('quiz-count').textContent = 'Q ' + String(quiz.idx+1).padStart(2,'0') + '/' + String(quiz.list.length).padStart(2,'0');
  document.getElementById('quiz-qp').style.width = ((quiz.idx+1)/quiz.list.length*100) + '%';

  const diffColor = q.diff >= 4 ? 'err' : q.diff >= 3 ? 'warn' : 'ok';
  const body = document.getElementById('quiz-body');
  body.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="tag">${q.module}</span>
        <span class="tag">${q.kp}</span>
        <span class="tag ${diffColor}">LV.${q.diff}</span>
      </div>
      <div class="q-stem">${tex(q.stem)}</div>
    </div>
    <div id="opt-list">
      ${q.options.map((o,i) => `
        <div class="opt" data-l="${o.l}" onclick="selOpt(this)">
          <span class="ol">${o.l}</span>
          <span>${tex(o.c)}</span>
        </div>`).join('')}
    </div>
    <div class="quiz-actions">
      <button class="btn btn-ghost" onclick="quitQuiz()">退出</button>
      <button class="btn btn-primary" id="btn-submit" disabled onclick="submitAnswer()">提交答案</button>
    </div>
  `;
}

function tex(s) {
  return s.replace(/\$([^$]+)\$/g, (m, t) => {
    try { return katex.renderToString(t.replace(/\\\\/g,'\\'), { throwOnError: false }); }
    catch(e) { return m; }
  });
}

function selOpt(el) {
  if (quiz.answered) return;
  document.querySelectorAll('#opt-list .opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  quiz.sel = el.dataset.l;
  document.getElementById('btn-submit').disabled = false;
}

function submitAnswer() {
  const q = quiz.list[quiz.idx];
  quiz.answered = true;
  const right = quiz.sel === q.answer;
  if (right) quiz.correctCnt++;

  document.querySelectorAll('#opt-list .opt').forEach(o => {
    o.classList.add('disabled');
    if (o.dataset.l === q.answer) {
      o.classList.add('right');
      o.innerHTML += '<span class="pass-fail" style="color:var(--accent);letter-spacing:0.08em">[PASS]</span>';
    }
    else if (o.dataset.l === quiz.sel) {
      o.classList.add('wrong');
      o.innerHTML += '<span class="pass-fail" style="color:var(--err);letter-spacing:0.08em">[FAIL]</span>';
    }
  });

  const body = document.getElementById('quiz-body');
  const banner = document.createElement('div');
  const tagClass = right ? 'ok' : 'no';
  const tagText = right ? '[PASS]' : '[FAIL]';
  const resultText = right ? '回答正确' : '回答错误';
  const resultDesc = right ? '继续保持，该知识点掌握度 +3%' : '正确答案：' + q.answer + ' · 已自动加入错题本';
  banner.innerHTML = `
    <div class="result-banner ${tagClass}">
      <div>
        <span class="rb-tag ${tagClass}">${tagText}</span>
      </div>
      <div>
        <div class="rt ${tagClass}">${resultText}</div>
        <div class="rd">${resultDesc}</div>
      </div>
    </div>
    <div class="analysis-card">
      <div class="at">ANALYSIS</div>
      <div class="ac">${tex(q.analysis)}</div>
      <div class="kp-tag-row">
        <span class="tag">KP · ${q.kp}</span>
        <span class="tag ${right?'ok':'err'}">${right?'MASTERY UP':'NEED PRACTICE'}</span>
      </div>
    </div>
  `;
  body.querySelector('.quiz-actions').before(banner);

  const btn = document.getElementById('btn-submit');
  btn.textContent = quiz.idx < quiz.list.length - 1 ? '下一题' : '查看结果';
  btn.onclick = nextQuestion;
}

function nextQuestion() {
  if (quiz.idx < quiz.list.length - 1) {
    quiz.idx++;
    renderQuiz();
    document.querySelector('#m-quiz').scrollTop = 0;
  } else {
    showQuizResult();
  }
}

function showQuizResult() {
  clearInterval(quizTimerInt);
  const total = quiz.list.length;
  const pct = Math.round(quiz.correctCnt/total*100);
  const scoreColor = pct >= 80 ? 'var(--accent)' : pct >= 60 ? 'var(--warn)' : 'var(--err)';
  document.getElementById('quiz-body').innerHTML = `
    <div class="q-card" style="text-align:center;padding:30px 18px">
      <div style="font-family:var(--font-display);font-size:40px;font-weight:800;color:${scoreColor}">${quiz.correctCnt}/${total}</div>
      <div style="font-family:var(--font-display);font-size:13px;color:var(--tx-2);margin-top:4px;letter-spacing:0.04em">ACC ${pct}% · TIME ${Math.floor(quizSecs/60)}M${quizSecs%60}S</div>
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <span class="tag ok">MASTERY +${quiz.correctCnt*3}%</span>
        ${quiz.correctCnt<total?'<span class="tag err">'+(total-quiz.correctCnt)+' ADDED TO WRONG BOOK</span>':''}
      </div>
    </div>
    <div class="m-card">
      <div class="m-title">数据已同步</div>
      <div style="font-family:var(--font-display);font-size:12px;color:var(--tx-2);line-height:2;letter-spacing:0.04em">
        [OK] 知识点画像已更新<br>
        [OK] 教师端看板实时可见<br>
        [OK] 错题已自动归档，可前往「错题本」重做
      </div>
    </div>
    <div class="quiz-actions">
      <button class="btn btn-ghost" onclick="goPage('m-home')">返回首页</button>
      <button class="btn btn-primary" onclick="startQuiz(quiz.mode)">再练一组</button>
    </div>
  `;
  document.getElementById('quiz-count').textContent = 'DONE';
  document.getElementById('quiz-qp').style.width = '100%';
}

function quitQuiz() {
  clearInterval(quizTimerInt);
  goPage('m-practice');
}

// ===== 课堂互动 =====
const codeDigits = document.querySelectorAll('.code-digit');
codeDigits.forEach((d, i) => {
  d.addEventListener('input', () => {
    if (d.value && i < codeDigits.length - 1) codeDigits[i+1].focus();
  });
  d.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !d.value && i > 0) codeDigits[i-1].focus();
  });
});

function joinClass() {
  const code = [...codeDigits].map(d => d.value).join('');
  if (code.length < 6) { toast('请输入完整的 6 位课堂码'); return; }
  document.getElementById('class-join').style.display = 'none';
  document.getElementById('class-live').style.display = 'block';
  simulateClass();
}

function simulateClass() {
  const body = document.getElementById('class-live-body');
  body.innerHTML = `
    <div class="class-hero">
      <div class="prompt">WAITING FOR TEACHER</div>
      <div class="cd">等待教师发起随堂测…</div>
    </div>`;
  setTimeout(() => classQuestion(), 2000);
}

let classSecs = 30;
let classInt = null;

function classQuestion() {
  classSecs = 30;
  const body = document.getElementById('class-live-body');
  body.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="tag err">CLASS QUIZ #2</span>
        <span class="tag">椭圆</span>
        <span class="tag warn" id="class-timer">T- 30</span>
      </div>
      <div class="q-stem">椭圆 $\\\\frac{x^2}{16} + \\\\frac{y^2}{7} = 1$ 的焦距为</div>
    </div>
    <div id="class-opts">
      <div class="opt" data-l="A" onclick="classSel(this)"><span class="ol">A</span><span>4</span></div>
      <div class="opt" data-l="B" onclick="classSel(this)"><span class="ol">B</span><span>6</span></div>
      <div class="opt" data-l="C" onclick="classSel(this)"><span class="ol">C</span><span>8</span></div>
      <div class="opt" data-l="D" onclick="classSel(this)"><span class="ol">D</span><span>2$\\\\sqrt{7}$</span></div>
    </div>`;
  // KaTeX 渲染
  body.querySelectorAll('.q-stem, .opt span:last-child').forEach(el => {
    el.innerHTML = tex(el.innerHTML);
  });

  classInt = setInterval(() => {
    classSecs--;
    const t = document.getElementById('class-timer');
    if (t) {
      t.textContent = 'T- ' + classSecs;
      if (classSecs <= 10) {
        t.classList.remove('warn');
        t.classList.add('err');
      }
    }
    if (classSecs <= 0) { clearInterval(classInt); classReveal(null); }
  }, 1000);
}

function classSel(el) {
  clearInterval(classInt);
  document.querySelectorAll('#class-opts .opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  setTimeout(() => classReveal(el.dataset.l), 600);
}

function classReveal(myChoice) {
  clearInterval(classInt);
  const right = 'B';
  const correct = myChoice === right;
  document.querySelectorAll('#class-opts .opt').forEach(o => {
    o.classList.add('disabled');
    if (o.dataset.l === right) {
      o.classList.add('right');
      o.innerHTML += '<span class="pass-fail" style="color:var(--accent);letter-spacing:0.08em">[PASS]</span>';
    }
    else if (o.dataset.l === myChoice) {
      o.classList.add('wrong');
      o.innerHTML += '<span class="pass-fail" style="color:var(--err);letter-spacing:0.08em">[FAIL]</span>';
    }
  });

  const body = document.getElementById('class-live-body');
  const extra = document.createElement('div');
  const tagClass = correct ? 'ok' : 'no';
  const tagText = correct ? '[PASS] +10' : myChoice ? '[FAIL] · ANSWER B' : '[TIMEOUT] · ANSWER B';
  extra.innerHTML = `
    <div class="result-banner ${tagClass}" style="margin-top:14px">
      <div>
        <span class="rb-tag ${tagClass}">${tagText}</span>
      </div>
      <div>
        <div class="rt ${tagClass}">${correct?'回答正确 +10 分':myChoice ? '回答错误，正确答案 B' : '时间到，正确答案 B'}</div>
        <div class="rd">$c^2 = a^2 - b^2 = 16 - 7 = 9$，焦距 $2c = 6$</div>
      </div>
    </div>
    <div class="m-card">
      <div class="m-title">全班作答分布 <span class="tag ok">SCREEN SYNC</span></div>
      <div class="answer-stat">
        <div class="as-bar"><div class="b"><div class="f" style="height:30%;background:var(--tx-3)">15%</div></div><div class="l">A</div></div>
        <div class="as-bar"><div class="b"><div class="f" style="height:65%;background:var(--accent)">65%</div></div><div class="l">B [PASS]</div></div>
        <div class="as-bar"><div class="b"><div class="f" style="height:12%;background:var(--tx-3)">12%</div></div><div class="l">C</div></div>
        <div class="as-bar"><div class="b"><div class="f" style="height:8%;background:var(--tx-3)">8%</div></div><div class="l">D</div></div>
      </div>
    </div>
    <div class="m-card">
      <div class="m-title">实时排名</div>
      <div class="rank-item"><span class="rank-no top">01</span><span class="rank-name">李思雨</span><span class="rank-score">40</span></div>
      <div class="rank-item me"><span class="rank-no top">02</span><span class="rank-name">张明</span><span class="rank-me">[ME]</span><span class="rank-score">${correct?'35':'25'}</span></div>
      <div class="rank-item"><span class="rank-no top">03</span><span class="rank-name">王浩然</span><span class="rank-score">20</span></div>
    </div>
    <button class="btn btn-ghost" onclick="leaveClass()">离开课堂</button>
  `;
  body.appendChild(extra);
  extra.querySelectorAll('.rd').forEach(el => el.innerHTML = tex(el.innerHTML));
}

function leaveClass() {
  clearInterval(classInt);
  document.getElementById('class-live').style.display = 'none';
  document.getElementById('class-join').style.display = 'block';
  codeDigits.forEach(d => d.value = '');
  toast('已离开课堂，数据已同步至学情');
}
</script>
<script src="js/themes.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', initThemeUI, { once: true });
</script>
</body>
