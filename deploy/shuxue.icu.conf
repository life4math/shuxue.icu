# shuxue.icu — Nginx 配置 (Alibaba Cloud Linux 3)
# 放置路径: /etc/nginx/conf.d/shuxue.icu.conf
# 注意: 需确保 nginx.conf 的 http {} 块中有 include /etc/nginx/conf.d/*.conf;
#       阿里云等保2.0定制版默认缺少此行，需手动添加

# HTTP -> HTTPS 重定向
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name shuxue.icu www.shuxue.icu _;

    # 所有 HTTP 请求重定向到 HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS 主服务
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name shuxue.icu www.shuxue.icu _;

    # SSL 证书
    ssl_certificate     /etc/nginx/ssl/shuxue.icu.pem;
    ssl_certificate_key /etc/nginx/ssl/shuxue.icu.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS (可选，建议启用)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/shuxue/website;
    index index.html;

    # 静态文件由 Nginx 直接服务 (性能更好)
    location /css/      { expires 7d; }
    location /js/       { expires 7d; }
    location /vendor/   { expires 30d; }
    # 后端代码和密钥配置禁止静态访问
    location ^~ /scripts/ { return 404; }
    # 上传内容可能包含学生个人信息，只允许通过已认证的 Flask API 访问
    location ^~ /uploads/ { return 404; }

    # 教师后台只在独立域名开放
    location = /admin.html { return 301 https://admin.shuxue.icu/; }
    location ^~ /api/v1/auth/ { return 404; }
    location ^~ /api/v1/admin/ { return 404; }

    # 前端路由 (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 请求转发到 Flask (Gunicorn, 8000端口)
    # 注意: 不用 5000 端口 — 阿里云 RemoteManage (Kestrel/.NET) 占用 5000
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }
}

