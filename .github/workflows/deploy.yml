name: Deploy to Alibaba Cloud ECS

# 推送 main 始终执行校验；提交信息含 [deploy] 或手动触发时才部署生产。
on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一时间只允许一个生产部署在跑，避免并发部署互相打架。
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── 阶段一：校验（GitHub 托管 Runner，避免 ECS 直连 GitHub 仓库）──
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-py311.lock

      - name: 前端文件完整性校验
        run: |
          python deploy/check_integrity.py
          python deploy/check_frontend.py
          find website/js -maxdepth 1 -name '*.js' ! -name '*.min.js' -print0 \
            | xargs -0 -n1 node --check

      - name: 后端单元测试
        run: |
          python -m pip install -q --require-hashes -r requirements-py311.lock
          python -m pytest -q tests

      - name: 生成离线部署包
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
        run: git bundle create "$RUNNER_TEMP/shuxue-release.bundle" HEAD

      - name: 上传离线部署包
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
        uses: actions/upload-artifact@v4
        with:
          name: shuxue-release-${{ github.sha }}
          path: ${{ runner.temp }}/shuxue-release.bundle
          if-no-files-found: error
          retention-days: 3

  # ── 阶段二：部署（校验通过后，更新生产目录并优雅重启）──
  deploy:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
    needs: verify
    runs-on: [self-hosted, shuxue]
    steps:
      - name: 下载已校验的离线部署包
        uses: actions/download-artifact@v4
        with:
          name: shuxue-release-${{ github.sha }}
          path: ${{ runner.temp }}/shuxue-release

      - name: 执行部署（含健康检查与失败自动回滚）
        run: sudo /var/www/shuxue/deploy/deploy.sh --bundle "$RUNNER_TEMP/shuxue-release/shuxue-release.bundle"
